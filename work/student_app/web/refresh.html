<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Refreshing NursePath Pakistan</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f4f8f7; color: #122b3a; font: 16px system-ui, sans-serif; }
    main { max-width: 420px; padding: 32px; text-align: center; }
    .mark { width: 58px; height: 58px; margin: 0 auto 18px; display: grid; place-items: center; border-radius: 18px; background: #0c3044; color: #62dcc1; font-size: 28px; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0; color: #637985; line-height: 1.5; }
  </style>
</head>
<body>
  <main>
    <div class="mark">♥</div>
    <h1>Updating NursePath</h1>
    <p>Removing the old pilot version and loading the latest student experience…</p>
  </main>
  <script>
    (async () => {
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map((registration) => registration.unregister()));
      }
      if ('caches' in window) {
        const names = await caches.keys();
        await Promise.all(names.map((name) => caches.delete(name)));
      }
      window.setTimeout(() => window.location.replace('/?release=semester-one-complete'), 500);
    })();
  </script>
</body>
</html>
